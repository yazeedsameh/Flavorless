<!DOCTYPE html>
<html>
<head>
    <title>Unit Converter</title>
</head>
<body>

<h2>Unit Converter</h2>

<label>Type of convertion:</label>
<select id="conversion">
    <option value="temperature">Temperature</option>
    <option value="length">Length</option>
    <option value="weight">Weight</option>
</select>

<br><br>

<label>Value:</label>
<input type="number" id="value">

<br><br>

<label>From:</label>
<select id="input"></select>

<label>To:</label>
<select id="output"></select>

<br><br>

<button onclick="convert()">Convert</button>

<h3 id="result"></h3>

<script>

var units = {
    temperature: ["C", "F", "K"],
    length: ["cm", "m", "km"],
    weight: ["kg", "g", "lb"]
};

function loadUnits() {
    var category = document.getElementById("conversion").value;
    var from = document.getElementById("input");
    var to = document.getElementById("output");

    from.innerHTML = "";
    to.innerHTML = "";

    units[category].forEach(function(unit) {
        from.innerHTML += "<option value='" + unit + "'>" + unit + "</option>";
        to.innerHTML += "<option value='" + unit + "'>" + unit + "</option>";
    });
}

document.getElementById("conversion").addEventListener("change", loadUnits);
window.onload = loadUnits;

function convert() {

    var conversationtype = document.getElementById("conversion").value;
    var value = parseFloat(document.getElementById("value").value);
    var from = document.getElementById("input").value;
    var to = document.getElementById("output").value;
    var result;

    if (conversationtype === "temperature") {

        
        var c;
        if (from === "C") c = value;
        if (from === "F") c = (value - 32) * 5/9;
        if (from === "K") c = value - 273.15;

        
        if (to === "C") result = c;
        if (to === "F") result = (c * 9/5) + 32;
        if (to === "K") result = c + 273.15;
    }

    if (conversationtype === "length") {

        var meters;
        if (from === "cm") meters = value / 100;
        if (from === "m") meters = value;
        if (from === "km") meters = value * 1000;

        if (to === "cm") result = meters * 100;
        if (to === "m") result = meters;
        if (to === "km") result = meters / 1000;
    }

    if (conversationtype === "weight") {

        var kg;
        if (from === "kg") kg = value;
        if (from === "g") kg = value / 1000;
        if (from === "lb") kg = value * 0.453592;

        if (to === "kg") result = kg;
        if (to === "g") result = kg * 1000;
        if (to === "lb") result = kg / 0.453592;
    }

    document.getElementById("result").innerHTML =
        "Result: " + result;
}

</script>

</body>
</html>
